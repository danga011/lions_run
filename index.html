<!--
  ============================================================
  HANYANG LIONS RUN — Supabase 리더보드 연동 가이드
  ============================================================

  [1] Supabase URL / ANON KEY 설정
      → 아래 <script> 블록에서 SUPABASE_URL, SUPABASE_ANON_KEY 상수를 찾아
        본인의 Supabase 프로젝트 값으로 채워 넣으세요.
        비워 두면 자동으로 localStorage 전용 모드(오프라인)로 동작합니다.

  [2] Supabase SQL 실행
      → 이 파일 맨 하단 주석 블록(SUPABASE SCHEMA SQL)을 복사해
        Supabase Dashboard > SQL Editor에서 실행하세요.

  [3] 정적 호스팅 배포 시 주의
      - 반드시 HTTPS로 서빙 (Supabase SDK가 https 필수)
      - Supabase 대시보드 > Auth > URL Configuration에 배포 도메인 등록
      - CORS 이슈 발생 시 Supabase 대시보드 > API > CORS Origins 확인
  ============================================================
-->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HANYANG LIONS RUN</title>
    <style>
        @font-face {
            font-family: 'Mulmaru';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Mulmaru.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; 
            background-color: #111; 
            font-family: 'Mulmaru', 'Menlo', 'Monaco', 'Consolas', monospace; 
            color: #fff;
            overflow: hidden; 
            touch-action: none; 
        }

        #gameContainer { 
            position: relative; 
            width: 1000px; 
            height: 550px; 
            background-image: url('bg.png'); 
            background-size: cover;    
            background-position: 0px 0px; 
            background-repeat: repeat-x; 
            border: 4px solid #004094; 
            box-shadow: 0 0 30px rgba(0, 64, 148, 0.7); 
            overflow: hidden; 
            transform-origin: center;
            transition: border-color 1s ease, box-shadow 1s ease;
        }

        /* 페이즈별 스타일 */
        #gameContainer.red-mode {
            background-image: url('bg_red.png'); 
            border-color: #ff3333;      
            box-shadow: 0 0 40px rgba(255, 51, 51, 0.6); 
        }
        #gameContainer.hyper-mode {
            background-image: url('bg_hyper.png'); 
            border-color: #ff00ff;     
            box-shadow: 0 0 60px rgba(255, 0, 255, 0.9); 
        }

        /* UI 요소 */
        #startScreen, #gameOverScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 1); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; 
        }
        #gameOverScreen { background-color: rgba(0, 0, 0, 0.9); display: none; }

        #transitionOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; opacity: 0; z-index: 1; pointer-events: none;   
            transition: opacity 0.8s ease; 
        }
        
        /* 텍스트 스타일 */
        .main-title {
            font-size: 80px; font-weight: normal; color: #fff;
            text-shadow: 0 0 15px #004094, 0 0 30px #004094;
            margin-bottom: 20px; letter-spacing: 5px; line-height: 1.1; text-align: center;
        }
        .sub-title { font-size: 24px; color: #aaa; margin-bottom: 60px; letter-spacing: 3px; }
        .blink-text { animation: blink 1.5s infinite; color: #0f0; margin-bottom: 30px; font-size: 20px; }
        @keyframes blink { 50% { opacity: 0; } }

        .start-btn, .action-btn {
            padding: 15px 40px; font-size: 20px; 
            background: #004094; color: #fff; border: 2px solid #fff;
            cursor: pointer; transition: 0.2s; font-family: inherit; 
            box-shadow: 0 0 15px #004094;
        }
        .start-btn:hover, .action-btn:hover { background: #fff; color: #004094; }

        /* 게임 오브젝트 */
        .ground-line {
            position: absolute; bottom: 0; width: 100%; height: 2px; 
            background-color: #004094; transition: 2s;
        }
        #gameContainer.red-mode .ground-line { background-color: #ff3333; }
        #gameContainer.hyper-mode .ground-line { background-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }

        #dino {
            width: 60px; height: 60px;
            background: transparent url('logo.png') no-repeat center/cover;
            position: absolute; bottom: 0; left: 80px;
            z-index: 5;
            filter: drop-shadow(0 0 2px #ffffff);
            will-change: transform;
            transform-origin: bottom center;
        }

        .obstacle { position: absolute; left: 0; z-index: 4; will-change: transform; }
        .cactus { 
            width: 80px; height: 70px; bottom: 0; 
            background: transparent url('stone.png') no-repeat center/contain;
            filter: drop-shadow(0 0 3px #ffffff);
        }
        .bird { 
            width: 90px; height: 60px; bottom: 110px;
            background: transparent url('fire.png') no-repeat center/contain;
            filter: drop-shadow(0 0 3px #ffffff);
        }
        .fireball {
            width: 70px; height: 70px; bottom: 55px;
            background: transparent url('fire.png') no-repeat center/contain;
            filter: drop-shadow(0 0 4px #ff6600);
        }

        #scoreBoard { 
            position: absolute; top: 20px; right: 30px; 
            font-size: 30px; color: #0f0; text-shadow: 0 0 5px #0f0; z-index: 10;
        }
        #gameContainer.red-mode #scoreBoard { color: #ffdd00; text-shadow: 0 0 10px #ffdd00; }
        #gameContainer.hyper-mode #scoreBoard { color: #00ffff; text-shadow: 0 0 15px #00ffff; }

        #perfectIndicator {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #ffd700;
            text-shadow: 0 0 12px #ffd700, 0 0 24px #ff8800;
            letter-spacing: 4px;
            opacity: 0;
            transform-origin: center;
            transition: opacity 0.15s ease-out, transform 0.15s ease-out;
            z-index: 11;
            pointer-events: none;
        }
        #perfectIndicator.show {
            opacity: 1;
            transform: translate(-50%, -12px) scale(1.1);
        }

        #liveRanking {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px; padding: 8px 12px;
            font-size: 13px; color: #ccc; line-height: 1.6;
            pointer-events: none; display: none; min-width: 150px;
        }
        #liveRanking .lr-title { color: #ffd700; font-size: 12px; margin-bottom: 4px; letter-spacing: 1px; }
        #liveRanking .lr-row { display: flex; justify-content: space-between; gap: 10px; }
        #liveRanking .lr-row:nth-child(2) { color: #ffd700; }
        #liveRanking .lr-row:nth-child(3) { color: #c0c0c0; }
        #liveRanking .lr-row:nth-child(4) { color: #cd7f32; }
        #gameContainer.red-mode #liveRanking { border-color: rgba(255,51,51,0.3); }
        #gameContainer.hyper-mode #liveRanking { border-color: rgba(255,0,255,0.3); }

        /* 파티클(먼지) 스타일 */
        .particle {
            position: absolute;
            background-color: #fff;
            width: 6px; height: 6px;
            border-radius: 50%;
            z-index: 3;
            pointer-events: none;
            opacity: 0.8;
            transition: transform 0.35s ease-out, opacity 0.35s ease-out;
        }
        
        /* 랭킹 스타일 */
        h1 { margin: 0 0 10px 0; color: #ff3333; font-size: 60px; text-shadow: 0 0 20px #ff3333; letter-spacing: 5px; }
        input {
            padding: 12px; font-size: 18px; background: #222; border: 2px solid #004094;
            color: #fff; text-align: center; outline: none; font-family: inherit;
        }
        .input-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .input-row input { width: auto; }
        #rankList { list-style: none; padding: 0; width: 600px; margin: 0; font-size: 20px; }
        #rankList li { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #555; color: #ccc; }
        #rankList li:nth-child(1) { color: #ffd700; text-shadow: 0 0 10px #ffd700; font-size: 24px;}
        #rankList li:nth-child(2) { color: #c0c0c0; text-shadow: 0 0 8px #c0c0c0; font-size: 22px; }
        #rankList li:nth-child(3) { color: #cd7f32; text-shadow: 0 0 8px #cd7f32; font-size: 22px; }

        #rankStatus {
            font-size: 14px; color: #888; margin-top: 12px; min-height: 20px;
            letter-spacing: 1px;
        }
        #rankStatus.online { color: #0f0; }
        #rankStatus.error  { color: #ff5555; }
        #rankStatus.nokey  { color: #ffaa00; }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="gameContainer">
    <div id="transitionOverlay"></div>
    
    <div id="startScreen">
        <div class="main-title">HANYANG<br>LIONS RUN</div>
        <div class="sub-title">: COLLEGE OF COMPUTING</div>
        <div class="blink-text">- SPACE to Start -</div>
        <button class="start-btn" onclick="startGame()">GAME START</button>
    </div>

    <div id="dino"></div>
    <div class="ground-line"></div>
    <div id="scoreBoard">SCORE: 0000</div>
    <div id="perfectIndicator">PERFECT!</div>
    <div id="liveRanking"></div>

    <div id="gameOverScreen">
        <h1>SYSTEM FAILURE</h1>
        <p style="color:#aaa; font-size: 20px; margin-bottom: 30px;">RUNTIME ERROR DETECTED</p>
        
        <div id="inputArea" style="text-align:center;">
            <p style="font-size: 20px;">FINAL SCORE: <span id="finalScore" style="color:#0f0">0</span></p>
            <div class="input-row">
                <input type="text" id="playerDept" placeholder="계열" maxlength="6" style="width:110px;">
                <input type="text" id="playerRealName" placeholder="이름" maxlength="5" style="width:90px;">
                <input type="text" id="playerPhone" placeholder="뒷자리(4자)" maxlength="4" style="width:110px;" inputmode="numeric">
            </div>
            <button class="action-btn" onclick="saveScore()">기록 저장</button>
        </div>

        <div id="rankingArea" style="display:none; width: 100%; flex-direction: column; align-items: center;">
            <h2 style="color:#004094; border-bottom:2px solid #fff; padding-bottom: 10px; font-size: 30px;">🏆 명예의 전당</h2>
            <ul id="rankList"></ul>
            <div id="rankStatus"></div>
            <button class="action-btn" onclick="goToStart()">처음으로</button>
        </div>
    </div>
</div>

<script>
    // ===== Supabase 설정 블록 (배포 전 반드시 채워 넣으세요) =====
    const SUPABASE_URL = 'https://qxmnovxvnflrzqcacvli.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4bW5vdnh2bmZscnpxY2FjdmxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMjM4OTgsImV4cCI6MjA4Nzg5OTg5OH0.kEflqYvlEZKHXrmGEkWZc8O6hX1hCHoKw9hMTlz804M';
    // ==============================================================

    let supabaseClient = null;
    let realtimeChannel = null;
    let lastSubmitTime = 0;
    let debounceTimer = null;

    if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const rankStatusEl = document.getElementById('rankStatus');

    function setRankStatus(mode) {
        if (!rankStatusEl) return;
        rankStatusEl.className = '';
        if (mode === 'online') {
            rankStatusEl.textContent = '실시간 랭킹 연결됨';
            rankStatusEl.classList.add('online');
        } else if (mode === 'error') {
            rankStatusEl.textContent = '네트워크 오류 — 로컬 랭킹 표시중';
            rankStatusEl.classList.add('error');
        } else if (mode === 'nokey') {
            rankStatusEl.textContent = 'Supabase 키 미설정 — 로컬 랭킹 표시중';
            rankStatusEl.classList.add('nokey');
        } else if (mode === 'loading') {
            rankStatusEl.textContent = '불러오는 중…';
            rankStatusEl.className = '';
        } else {
            rankStatusEl.textContent = '';
        }
    }


    function renderRankList(rankings) {
        rankListElement.innerHTML = "";
        if (!rankings.length) {
            rankListElement.innerHTML = "<li style='text-align:center;border:none;color:#aaa;'>기록 없음</li>";
            return;
        }
        rankings.slice(0, 3).forEach((rank, index) => {
            let li = document.createElement("li");
            li.innerHTML = `<span>${index + 1}. ${rank.name}</span> <span>${rank.score}</span>`;
            rankListElement.appendChild(li);
        });
    }

    const liveRankingEl = document.getElementById('liveRanking');

    async function fetchLiveRanking() {
        if (!supabaseClient || !liveRankingEl) return;
        try {
            const { data, error } = await supabaseClient
                .from('scores')
                .select('player_name, score')
                .order('score', { ascending: false })
                .order('created_at', { ascending: true })
                .limit(5);
            if (error) throw error;
            renderLiveRanking(data);
        } catch (e) {
            liveRankingEl.style.display = 'none';
        }
    }

    function renderLiveRanking(data) {
        if (!data || !data.length) { liveRankingEl.style.display = 'none'; return; }
        let html = '<div class="lr-title">🏆 TOP 5</div>';
        data.forEach((r, i) => {
            let parts = r.player_name.split(' ');
            let shortName = parts.length >= 2 ? parts[1] : r.player_name;
            html += `<div class="lr-row"><span>${i+1}. ${shortName}</span><span>${r.score}</span></div>`;
        });
        liveRankingEl.innerHTML = html;
        liveRankingEl.style.display = 'block';
    }

    function subscribeRealtime() {
        if (!supabaseClient) return;
        if (realtimeChannel) return; // 이미 구독 중이면 재사용
        realtimeChannel = supabaseClient
            .channel('scores-realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'scores' }, () => {
                if (debounceTimer) clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    fetchLiveRanking();
                    if (rankingArea.style.display === 'flex') showRankings();
                }, 300);
            })
            .subscribe();
    }

    function unsubscribeRealtime() {
        if (realtimeChannel) {
            supabaseClient.removeChannel(realtimeChannel);
            realtimeChannel = null;
        }
        if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
    }

    const dino = document.getElementById("dino");
    const gameContainer = document.getElementById("gameContainer");
    const scoreElement = document.getElementById("scoreBoard");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const inputArea = document.getElementById("inputArea");
    const rankingArea = document.getElementById("rankingArea");
    const finalScoreSpan = document.getElementById("finalScore");
    const playerDeptInput = document.getElementById("playerDept");
    const playerRealNameInput = document.getElementById("playerRealName");
    const playerPhoneInput = document.getElementById("playerPhone");
    const rankListElement = document.getElementById("rankList");
    const overlay = document.getElementById("transitionOverlay");
    const perfectIndicator = document.getElementById("perfectIndicator");
    
    let currentPhase = 0; 
    let isGameStarted = false;
    let isGameOver = false;
    let score = 0;
    let perfectCount = 0;
    let animationFrameId;
    let lastFrameTime = 0;
    let scoreAccum = 0;
    const SCORE_MS = 100; // 100ms당 1점
    let frameCount = 0;

    let dinoY = 0;
    let velocity = 0;
    let isJumping = false;
    let isDucking = false;
    let bgPosition = 0;

    const GRAVITY = 0.85;
    const JUMP_POWER = 14;
    let gameSpeed = 5;
    let spawnTimer = 0;
    let obstacles = []; 

    function resizeGame() {
        let scale = Math.min(window.innerWidth / 1250, window.innerHeight / 550, 1);
        gameContainer.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();

    document.addEventListener('keydown', function(event) {
        if (event.code === 'Space') {
            handleInput();
        } else if (event.code === 'ArrowDown' && isGameStarted && !isGameOver) {
            if (isJumping) {
                velocity = -15;
            } else if (!isDucking) {
                startDuck();
            }
        }
    });

    document.addEventListener('keyup', function(event) {
        if (event.code === 'ArrowDown' && isDucking) {
            endDuck();
        }
    });

    gameContainer.addEventListener('touchstart', function(event) {
        event.preventDefault(); handleInput();
    }, {passive: false});

    function handleInput() {
        if (!isGameStarted) startGame();
        else if (!isGameOver && !isJumping) {
            const isPerfect = checkPerfectTiming();
            isJumping = true;
            velocity = JUMP_POWER;
            createDust(100, 10, 3);
            if (isPerfect) triggerPerfect();
        }
        else if (isGameOver && rankingArea.style.display === 'flex') goToStart();
    }

    function gameLoop(timestamp) {
        if (!isGameStarted || isGameOver) return;

        if (!lastFrameTime) lastFrameTime = timestamp;
        let elapsed = timestamp - lastFrameTime;
        lastFrameTime = timestamp;
        if (elapsed > 50) elapsed = 50; // 탭 전환 시 폭주 방지

        // dt: 60fps 기준 1.0 (30fps→2.0, 120fps→0.5)
        let dt = elapsed / 16.667;

        gameTick(dt, elapsed);

        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function gameTick(dt, elapsedMs) {
        frameCount++;

        // 1. 점수 (시간 기반: 100ms당 1점 — 모든 기기 동일)
        scoreAccum += elapsedMs;
        while (scoreAccum >= SCORE_MS) {
            scoreAccum -= SCORE_MS;
            score++;
            if (score > 0 && score % 100 === 0) gameSpeed += 2.5;
            if (score >= 300 && currentPhase < 1) {
                currentPhase = 1; changeBackgroundPhase('red-mode');
            } else if (score >= 600 && currentPhase < 2) {
                currentPhase = 2; changeBackgroundPhase('hyper-mode');
            }
        }
        scoreElement.innerText = "SCORE: " + score.toString().padStart(4, '0');

        // 2. 물리 (dt 기반 — GPU transform 사용)
        if (isJumping) {
            velocity -= GRAVITY * dt;
            dinoY += velocity * dt;
            if (dinoY <= 0) {
                dinoY = 0; isJumping = false; velocity = 0;
                createDust(100, 0, 3);
            }
        } else {
            if (frameCount % 20 === 0) createDust(85, 0, 1);
        }
        const scaleX = isDucking ? 1.25 : 1;
        const scaleY = isDucking ? 0.55 : 1;
        dino.style.transform = 'translateY(-' + dinoY + 'px) scale(' + scaleX + ',' + scaleY + ')';

        // 3. 배경 스크롤
        bgPosition -= gameSpeed * 0.15 * dt;
        gameContainer.style.backgroundPositionX = bgPosition + 'px';

        // 4. 장애물 생성
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
            createObstacle();
            let speedFactor = (gameSpeed - 9) * 2.5;
            let minGap = 70 - speedFactor;
            let maxGap = 140 - speedFactor;
            if (minGap < 35) minGap = 35;
            if (maxGap < 65) maxGap = 65;
            spawnTimer = Math.random() * (maxGap - minGap) + minGap;
        }

        updateObstacles(dt);
    }

    function startDuck() {
        isDucking = true;
    }

    function endDuck() {
        isDucking = false;
    }

    function checkPerfectTiming() {
        // 장애물이 공룡 바로 앞에서(충돌 구간 직전) 점프해야 퍼펙트 판정
        // 충돌 체크 x 구간이 130~50이므로, 그보다 살짝 앞인 200~170 정도만 허용 (꽤 빡셈)
        for (let i = 0; i < obstacles.length; i++) {
            const obs = obstacles[i];
            if (obs.usedPerfect) continue;
            if (obs.x <= 200 && obs.x >= 170) {
                obs.usedPerfect = true;
                return true;
            }
        }
        return false;
    }

    function triggerPerfect() {
        perfectCount++;
        score += 10; // 퍼펙트 보너스 점수
        scoreElement.innerText = "SCORE: " + score.toString().padStart(4, '0');

        if (!perfectIndicator) return;
        perfectIndicator.classList.remove('show');
        // 살짝 딜레이 후 다시 붙여서 트랜지션 재생
        setTimeout(() => {
            perfectIndicator.classList.add('show');
        }, 10);

        // 모드별로 색상 살짝 변화
        if (currentPhase === 1) {
            perfectIndicator.style.color = '#ffdd00';
            perfectIndicator.style.textShadow = '0 0 12px #ffdd00, 0 0 24px #ff5500';
        } else if (currentPhase === 2) {
            perfectIndicator.style.color = '#00ffff';
            perfectIndicator.style.textShadow = '0 0 14px #00ffff, 0 0 28px #0066ff';
        } else {
            perfectIndicator.style.color = '#ffd700';
            perfectIndicator.style.textShadow = '0 0 12px #ffd700, 0 0 24px #ff8800';
        }

        setTimeout(() => {
            perfectIndicator.classList.remove('show');
        }, 450);
    }

    // 파티클 생성
    function createDust(x, y, count) {
        for(let i=0; i<count; i++) {
            const dust = document.createElement('div');
            dust.classList.add('particle');
            
            dust.style.left = (x + Math.random() * 20) + 'px';
            dust.style.bottom = (y + Math.random() * 10) + 'px';
            
            if(currentPhase === 1) dust.style.backgroundColor = '#ffcc00'; 
            else if(currentPhase === 2) dust.style.backgroundColor = '#00ffff';

            gameContainer.appendChild(dust);

            setTimeout(() => {
                let moveX = (Math.random() - 0.5) * 50 - 30; 
                let moveY = Math.random() * 30;              
                dust.style.transform = `translate(${moveX}px, -${moveY}px) scale(0)`;
                dust.style.opacity = '0';
            }, 10);

            setTimeout(() => { dust.remove(); }, 500);
        }
    }

    function updateObstacles(dt) {
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= gameSpeed * dt;
            obs.element.style.transform = 'translateX(' + obs.x + 'px)';

            if (obs.x < -150) {
                obs.element.remove();
                obstacles.splice(i, 1);
                continue;
            }

            if (obs.x < 130 && obs.x > 50) {
                let dinoBottom = dinoY;
                if (obs.type === 'bird') {
                    if (dinoBottom > 50) gameOver();
                } else if (obs.type === 'fireball') {
                    // 중간 높이 파이어볼:
                    // - 아래키로 숙이면(duck) 아래로 파고들어 회피
                    // - 아주 높게 점프(dinoBottom > 80)하면 위로 넘어가며 회피
                    // 그 외(바닥에 그냥 서 있거나, 낮게 점프)는 전부 피격
                    if (!isDucking && dinoBottom <= 80) gameOver();
                } else {
                    if (dinoBottom < 50) gameOver();
                }
            }
        }
    }

    function createObstacle() {
        const obsElem = document.createElement('div');
        obsElem.classList.add('obstacle');

        // 항상 세 종류가 섞여 나오도록 단순화
        // 낮은 점수에서도 바로 중간 파이어볼을 경험할 수 있게 함
        let type;
        const r = Math.random();
        if (r < 0.4) type = 'cactus';          // 40%
        else if (r < 0.7) type = 'fireball';   // 30%
        else type = 'bird';                    // 30%

        let startX = 1100;

        if (type === 'bird') {
            obsElem.classList.add('bird');
        } else if (type === 'fireball') {
            obsElem.classList.add('fireball');
        } else {
            obsElem.classList.add('cactus');
        }
        obsElem.style.transform = 'translateX(' + startX + 'px)';

        gameContainer.appendChild(obsElem);
        obstacles.push({ element: obsElem, x: startX, type: type, usedPerfect: false });
    }

    function startGame() {
        isGameStarted = true; isGameOver = false; score = 0;
        gameSpeed = 9; spawnTimer = 0; obstacles = []; bgPosition = 0;
        lastFrameTime = 0; scoreAccum = 0; frameCount = 0;
        
        scoreElement.innerText = "SCORE: 0000";
        gameContainer.classList.remove('red-mode');
        gameContainer.classList.remove('hyper-mode');
        overlay.style.opacity = 0; currentPhase = 0;
        
        startScreen.style.display = "none";
        gameOverScreen.style.display = "none";
        document.querySelectorAll('.obstacle').forEach(e => e.remove());
        document.querySelectorAll('.particle').forEach(e => e.remove());

        dinoY = 0; velocity = 0; isJumping = false; isDucking = false;
        dino.style.transform = 'translateY(0) scale(1,1)';
        cancelAnimationFrame(animationFrameId);
        fetchLiveRanking();
        subscribeRealtime();
        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        isGameOver = true;
        cancelAnimationFrame(animationFrameId);
        if (liveRankingEl) liveRankingEl.style.display = 'none';
        gameOverScreen.style.display = "flex";
        inputArea.style.display = "block";
        rankingArea.style.display = "none";
        finalScoreSpan.innerText = score;
        playerDeptInput.value = "";
        playerRealNameInput.value = "";
        playerPhoneInput.value = "";
        playerDeptInput.focus();
    }

    function goToStart() {
        isGameStarted = false; isGameOver = false;
        gameContainer.classList.remove('red-mode');
        gameContainer.classList.remove('hyper-mode');
        document.querySelectorAll('.obstacle').forEach(e => e.remove());
        gameOverScreen.style.display = "none";
        startScreen.style.display = "flex";
        unsubscribeRealtime();
    }

    async function saveScore() {
        // Rate limit: 3초 이내 중복 제출 방지
        const now = Date.now();
        if (now - lastSubmitTime < 3000) return;
        lastSubmitTime = now;

        let dept = playerDeptInput.value.trim();
        let realName = playerRealNameInput.value.trim();
        let phone = playerPhoneInput.value.trim();

        if (!dept || !realName || !phone) return; // 세 필드 모두 필수
        if (!/^\d{4}$/.test(phone)) { playerPhoneInput.focus(); return; } // 숫자 4자리만

        let name = `${dept} ${realName} ${phone}`;

        if (!supabaseClient) { setRankStatus('nokey'); return; }

        try {
            const { error } = await supabaseClient
                .from('scores')
                .insert({ player_name: name, score: score });
            if (error) throw error;
            showRankings();
        } catch (e) {
            showRankings(true);
        }
    }

    async function showRankings(failed) {
        inputArea.style.display = "none";
        rankingArea.style.display = "flex";
        setRankStatus('loading');

        if (!supabaseClient) { renderRankList([]); setRankStatus('nokey'); return; }
        if (failed) { renderRankList([]); setRankStatus('error'); return; }

        try {
            const { data, error } = await supabaseClient
                .from('scores')
                .select('player_name, score')
                .order('score', { ascending: false })
                .order('created_at', { ascending: true })
                .limit(3);
            if (error) throw error;
            renderRankList(data.map(r => ({ name: r.player_name, score: r.score })));
            setRankStatus('online');
            subscribeRealtime();
        } catch (e) {
            renderRankList([]);
            setRankStatus('error');
        }
    }
    
    function changeBackgroundPhase(newModeClass) {
        overlay.style.opacity = 1;
        setTimeout(() => {
            gameContainer.classList.remove('red-mode'); 
            gameContainer.classList.remove('hyper-mode');
            gameContainer.classList.add(newModeClass);
            overlay.style.opacity = 0;
        }, 800); 
    }
</script>

  -- 1) 테이블 생성
  CREATE TABLE public.scores (
      id         uuid PRIMARY KEY DEFAULT gen_random_uuid(),
      player_name text NOT NULL,
      score      bigint NOT NULL CHECK (score >= 0),
      created_at timestamptz DEFAULT now()
  );

  -- 2) 성능 인덱스 (Top N 조회 최적화)
  CREATE INDEX idx_scores_rank ON public.scores (score DESC, created_at ASC);

  -- 3) Row Level Security 활성화
  ALTER TABLE public.scores ENABLE ROW LEVEL SECURITY;

  -- 4) SELECT 정책: 누구나 읽기 가능
  CREATE POLICY "Public read access"
      ON public.scores FOR SELECT
      USING (true);

  -- 5) INSERT 정책: 누구나(anon) 삽입 가능
  CREATE POLICY "Public insert access"
      ON public.scores FOR INSERT
      WITH CHECK (true);

  -- UPDATE / DELETE 정책 없음 → 자동 차단
